---
- name: Add a line to the end of a file
  hosts: all # Replace with your target host(s) or group
  tasks:
    - name: Ensure a specific line exists at the end of the file
      ansible.builtin.lineinfile:
        path: /home/ansible/.ssh/authorized_keys # Replace with the actual file path
        line: "ssh-rsa  ansible@ansibletestbuild"
        insertafter: EOF
        create: true # Set to true if you want to create the file if it doesn't

